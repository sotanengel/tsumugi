name: Bug Report
description: Report a bug in Tsumugi
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Tsumugi version
      placeholder: e.g. 0.1.0
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Any relevant logs or screenshots
